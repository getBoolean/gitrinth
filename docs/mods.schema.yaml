$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods.schema.yaml
title: mods.yaml
description: |
  Schema for a gitrinth modpack manifest, targeting Modrinth-hosted
  Minecraft mods.

type: object
additionalProperties: false
required:
  - slug
  - name
  - version
  - description
  - loader
  - mc-version

properties:

  slug:
    type: string
    description: |
      Modrinth project slug for the modpack — the URL segment at
      modrinth.com/modpack/<slug>. Also used in generated artifact
      filenames. Lowercase ASCII letters, digits, and underscores;
      must start with a letter.
    pattern: ^[a-z][a-z0-9_]*$

  name:
    type: string
    description: |
      Human-readable display name of the modpack, shown on the Modrinth
      project page. Maps to Modrinth's `title` field. Any non-empty
      string.
    minLength: 1

  version:
    type: string
    description: |
      Semantic version of the modpack itself, e.g. "1.0.0", "0.4.0-beta.1".
    pattern: ^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*$

  description:
    type: string
    description: Short, public-facing summary shown on Modrinth.
    minLength: 1

  project:
    type: [object, "null"]
    additionalProperties: false
    description: |
      Modrinth project metadata. Every field in this block maps 1:1 to
      the corresponding field in Modrinth's createProject API. All
      sub-fields are optional; the whole block may be omitted.
    properties:

      body:
        type: [string, "null"]
        description: |
          Long-form project description shown on the Modrinth project
          page. Either inline markdown, or a path (relative to
          mods.yaml) to a markdown file. If the value resolves to an
          existing file, gitrinth reads the file at publish time;
          otherwise the value is treated as literal markdown.

      source_url:
        type: [string, "null"]
        format: uri
        description: URL of the modpack's source repository.

      issues_url:
        type: [string, "null"]
        format: uri
        description: URL of the modpack's issue tracker.

      wiki_url:
        type: [string, "null"]
        format: uri
        description: URL of the modpack's user-facing documentation.

      discord_url:
        type: [string, "null"]
        format: uri
        description: URL of the modpack's Discord invite.

      license_id:
        type: [string, "null"]
        description: |
          SPDX identifier of the modpack's license (e.g. "MIT",
          "Apache-2.0").

      license_url:
        type: [string, "null"]
        format: uri
        description: URL pointing at the full license text.

      donation_urls:
        type: [array, "null"]
        description: |
          Links to platforms where users can donate to the modpack
          author. Each entry matches Modrinth's donation_urls shape.
        items:
          type: object
          additionalProperties: false
          required:
            - platform
            - url
          properties:
            platform:
              type: string
              description: |
                Modrinth donation-platform identifier — one of the short
                ids returned by Modrinth's `GET /tag/donation_platform`
                endpoint. The `gitrinth` CLI expands this id into
                Modrinth's separate `id` and display-name pair when
                publishing, so the list is fixed and custom identifiers
                are rejected.
              enum:
                - patreon
                - bmac
                - paypal
                - github
                - ko-fi
                - other
            url:
              type: string
              format: uri
              description: Donation URL on the platform.

      categories:
        type: [array, "null"]
        description: |
          Primary Modrinth modpack categories. Values must match
          Modrinth's catalogue of modpack tags.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      additional_categories:
        type: [array, "null"]
        description: |
          Secondary Modrinth modpack categories — searchable but
          non-primary. They affect Modrinth search results but do not
          appear as primary tags on the project page.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      client_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: |
          Client-side compatibility declared for the modpack, shown on
          the Modrinth project page.

      server_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: |
          Server-side compatibility declared for the modpack, shown on
          the Modrinth project page.

      gallery:
        type: [array, "null"]
        description: |
          List of screenshot paths relative to mods.yaml. Used to
          populate the Modrinth gallery when publishing.
        items:
          type: string
          minLength: 1

  publish_to:
    description: |
      URL of the Modrinth-compatible server `gitrinth publish` uploads the
      modpack to. Omit (or set `null`) to publish to modrinth.com, the
      default.
    type: [string, "null"]
    format: uri

  loader:
    type: string
    description: |
      The mod loader the modpack targets. Three roles:
        - Version resolution: gitrinth only considers published mod,
          resource-pack, data-pack, shader, and plugin versions tagged
          with this loader when picking the latest compatible version.
        - Published compatibility: declared as the modpack's supported
          loader on Modrinth when `gitrinth publish` uploads the pack.
        - Server distribution selection: combined with `mc-version`,
          `loader` determines which server binary gitrinth downloads
          and bundles into the server distribution — a Forge/Fabric/
          NeoForge/Sponge installer, or the latest stable Paper/Spigot/
          Folia/Bukkit build for the target Minecraft version. Users
          never pin the server binary in this file and do not add it
          manually after the build.
      Values are plain YAML strings and do not need to be quoted.

      When `loader` is `bukkit`, `folia`, `paper`, or `spigot` (the
      "plugin loaders"), every entry under `mods` is bundled into the
      client-side modpack only, regardless of its declared `environment`
      — those loaders do not run Forge/Fabric-style mods server-side.
      `resource_packs` and `data_packs` remain compatible with plugin
      loaders and honour their declared `environment`. `plugins` ship to
      the server distribution. `shaders` are always client-only under
      every loader. `sponge` behaves like `forge`, `fabric`, and
      `neoforge` with no override.
    enum:
      - forge
      - fabric
      - neoforge
      - bukkit
      - folia
      - paper
      - spigot
      - sponge

  mc-version:
    type: string
    description: |
      Exact Minecraft version, e.g. "1.21.1". Ranges and wildcards are
      not permitted. Three roles:
        - Version resolution: gitrinth only considers published mod,
          resource-pack, data-pack, shader, and plugin versions tagged
          with this Minecraft version when picking the latest compatible
          version.
        - Published compatibility: declared as the modpack's supported
          Minecraft version on Modrinth when `gitrinth publish` uploads
          the pack.
        - Server distribution selection: together with `loader`, the
          `mc-version` is what gitrinth uses to pick the server binary
          bundled into the server distribution. Users do not specify the
          server binary; it is not added manually.
    pattern: ^\d+\.\d+(?:\.\d+)?$

  tooling:
    type: [object, "null"]
    description: |
      Version constraints on the tooling used to build this modpack.
    additionalProperties: false
    properties:
      gitrinth:
        type: [string, "null"]
        description: |
          Version constraint on the gitrinth CLI, using semver range
          syntax (e.g. "^1.0.0" or ">=1.0.0 <2.0.0"). May be blank.
        minLength: 1

  mods:
    description: |
      Mods included in the modpack. Keys are Modrinth project slugs;
      values are dependencies (short or long form). May be blank — useful
      for a modpack that is still being assembled.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  resource_packs:
    description: |
      Resource packs included in the modpack. Same syntax as `mods`; keys
      are Modrinth project slugs, values are dependencies (short or long
      form). May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  data_packs:
    description: |
      Data packs included in the modpack. Same syntax as `mods`; keys are
      Modrinth project slugs, values are dependencies (short or long form).
      May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  shaders:
    description: |
      Shader packs included in the modpack. Same syntax as `mods` except
      that the per-entry `environment` field is not permitted — shaders
      are always client-only. Keys are Modrinth project slugs; values
      are dependencies (short or long form). May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/forcedEnvModMap"

  plugins:
    description: |
      Server plugins included in the modpack. Same syntax as `mods`
      except that the per-entry `environment` field is not permitted —
      plugins are always server-only, the analogue of shaders being
      always client-only. Keys are Modrinth project slugs (from
      modrinth.com/plugin/<slug>), values are dependencies (short or
      long form). May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/forcedEnvModMap"

  overrides:
    description: |
      Overrides for individual entries in `mods`, `resource_packs`,
      `data_packs`, `shaders`, or `plugins`. Uses the exact same value
      syntax as `mods` and takes precedence over any matching entry in
      those fields. Keys are Modrinth project slugs. May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  servers:
    type: [array, "null"]
    description: |
      Default servers embedded in the client distribution's server list.
      Each entry is shown in the multiplayer menu when players launch the
      modpack.
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - address
      properties:
        name:
          type: string
          minLength: 1
          description: Display name of the server in the multiplayer menu.
        address:
          type: string
          minLength: 1
          description: Server address, optionally including a port (e.g. "play.example.com:25565").

$defs:

  modVersion:
    description: |
      A mod-version constraint. Either:
        - blank / null, meaning the latest compatible version
        - any non-empty version string, optionally prefixed with `^` for a
          caret constraint (e.g. "19.27.0.340", "^6.0.10+mc1.21.1",
          "^r5.7.1"). Mod authors use a wide variety of version formats,
          so the string itself is not pattern-validated here.
    oneOf:
      - type: "null"
      - type: string
        minLength: 1

  modDependency:
    description: |
      A single mod dependency. Either:
        - Short form: a mod-version constraint (string or null), fetched
          from the default Modrinth instance.
        - Long form: an object specifying at most one source (`hosted`,
          `url`, `path`, or `git`) and, optionally, a `version`
          constraint. Omitting all source fields is equivalent to the
          default Modrinth source.
    oneOf:
      - $ref: "#/$defs/modVersion"
      - $ref: "#/$defs/modSource"

  modSource:
    type: object
    description: |
      Long-form mod dependency. Specify at most one of `hosted`, `url`,
      `path`, or `git`. `url`, `path`, and `git` sources make the modpack
      non-publishable to Modrinth.
    additionalProperties: false
    properties:
      version:
        $ref: "#/$defs/modVersion"
      environment:
        description: |
          Which side of the modpack this mod ships with. Defaults to
          "both" when omitted.
        default: both
        enum:
          - client
          - server
          - both
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct download URL for a mod .jar file.
      path:
        type: string
        description: Local filesystem path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source. Either an "owner/repo" shorthand string, a full git
          URL, or an object with `url` and optionally `ref` and `path`.
          The resolved tree must contain a mods.toml describing the mod.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  modMap:
    type: object
    description: |
      Map of Modrinth project slug to mod dependency (short or long form).
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/modDependency"

  forcedEnvSource:
    type: object
    description: |
      Long-form dependency for sections whose side is fixed by the
      section itself — `shaders` (always client-only) and `plugins`
      (always server-only). Structurally identical to `modSource`
      except that the `environment` field is not permitted. Declaring
      `environment` on an entry in these sections is a schema error;
      the section already decides the side.
    additionalProperties: false
    errorMessage:
      additionalProperties: "`environment` is not allowed here — shaders are always client-only and plugins are always server-only. Remove this field; the section itself decides the side."
    properties:
      version:
        $ref: "#/$defs/modVersion"
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct download URL for a .jar file.
      path:
        type: string
        description: Local filesystem path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source. Either an "owner/repo" shorthand string, a full git
          URL, or an object with `url` and optionally `ref` and `path`.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  forcedEnvModMap:
    type: object
    description: |
      Map of Modrinth project slug to dependency (short or long form),
      with the per-entry `environment` field disallowed. Used for
      sections whose environment is fixed by the section itself:
      `shaders` (always client-only) and `plugins` (always server-only).
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      # Dispatch on value shape so the validator reports a specific
      # error (e.g. "`environment` is not allowed") rather than the
      # generic "matches 0 schemas" that oneOf produces when every
      # branch fails.
      if:
        type: object
      then:
        $ref: "#/$defs/forcedEnvSource"
      else:
        $ref: "#/$defs/modVersion"
