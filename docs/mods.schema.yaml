$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods.schema.yaml
title: mods.yaml
description: |
  Schema for a gitrinth modpack manifest, targeting Modrinth-hosted
  Minecraft mods.

type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - description
  - environment

properties:

  id:
    type: string
    description: |
      Machine-readable identifier of the modpack, used as the Modrinth
      project slug and in generated artifact filenames. Lowercase ASCII
      letters, digits, and underscores; must start with a letter.
    pattern: ^[a-z][a-z0-9_]*$

  name:
    type: string
    description: |
      Human-readable display name of the modpack, shown on the Modrinth
      project page. Any non-empty string.
    minLength: 1

  version:
    type: string
    description: |
      Semantic version of the modpack itself, e.g. "1.0.0", "0.4.0-beta.1".
    pattern: ^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*$

  description:
    type: string
    description: Short, public-facing summary shown on Modrinth.
    minLength: 1

  homepage:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's home page.

  repository:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's source repository.

  issue_tracker:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's issue tracker.

  documentation:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's user-facing documentation.

  publish_to:
    description: |
      Controls where `gitrinth publish` uploads the modpack. Set to "none"
      to disable publishing, or to a URL to target a custom Modrinth-
      compatible server. Omit for the default Modrinth instance.
    oneOf:
      - type: "null"
      - const: none
      - type: string
        format: uri

  gallery:
    type: [array, "null"]
    description: |
      List of screenshot paths relative to mods.yaml. Used to populate the
      Modrinth gallery when publishing.
    items:
      type: string
      minLength: 1

  categories:
    type: [array, "null"]
    description: |
      List of Modrinth modpack categories. Values must match Modrinth's
      catalogue of modpack tags.
    items:
      type: string
      minLength: 1
    uniqueItems: true

  game:
    description: |
      The game the modpack targets. Currently only "minecraft" is supported;
      the field exists so future gitrinth releases can target additional
      games without a breaking schema change. Defaults to "minecraft" when
      omitted.
    type: [string, "null"]
    enum:
      - minecraft
      - null

  environment:
    type: object
    description: Target Minecraft environment for the modpack.
    additionalProperties: false
    required:
      - loader
      - mc-version
    properties:
      loader:
        type: string
        description: |
          The mod loader the modpack targets. Values
          are plain YAML strings and do not need to be quoted.
        enum:
          - forge
          - fabric
          - neoforge
      mc-version:
        type: string
        description: |
          Exact Minecraft version, e.g. "1.21.1". Ranges and wildcards are
          not permitted.
        pattern: ^\d+\.\d+(?:\.\d+)?$
      gitrinth:
        type: [string, "null"]
        description: |
          Version constraint on the gitrinth CLI, using semver range
          syntax (e.g. "^1.0.0" or ">=1.0.0 <2.0.0"). May be blank.
        minLength: 1

  mods:
    description: |
      Mods included in the modpack. Keys are Modrinth project slugs;
      values are dependencies (short or long form). May be blank — useful
      for a modpack that is still being assembled.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  resource_packs:
    description: |
      Resource packs included in the modpack. Same syntax as `mods`; keys
      are Modrinth project slugs, values are dependencies (short or long
      form). May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  data_packs:
    description: |
      Data packs included in the modpack. Same syntax as `mods`; keys are
      Modrinth project slugs, values are dependencies (short or long form).
      May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  shaders:
    description: |
      Shader packs included in the modpack. Same syntax as `mods`; keys
      are Modrinth project slugs, values are dependencies (short or long
      form). May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  overrides:
    description: |
      Overrides for individual entries in `mods`, `resource_packs`,
      `data_packs`, or `shaders`. Uses the exact same value syntax as
      `mods` and takes precedence over any matching entry in those fields.
      Keys are Modrinth project slugs. May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  servers:
    type: [array, "null"]
    description: |
      Default servers embedded in the client distribution's server list.
      Each entry is shown in the multiplayer menu when players launch the
      modpack.
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - address
      properties:
        name:
          type: string
          minLength: 1
          description: Display name of the server in the multiplayer menu.
        address:
          type: string
          minLength: 1
          description: Server address, optionally including a port (e.g. "play.example.com:25565").

$defs:

  modVersion:
    description: |
      A mod-version constraint. Exactly one of:
        - an exact version (e.g. "19.27.0.340", "6.0.10+mc1.21.1")
        - blank / null, meaning the latest compatible version
        - a caret constraint (e.g. "^6.0.10+mc1.21.1") for the latest
          version compatible with the given one
    oneOf:
      - type: "null"
      - type: string
        pattern: ^(?:\^)?\d+\.\d+(?:\.\d+)?(?:\.\d+)?(?:[-+][0-9A-Za-z.+\-]+)?$

  modDependency:
    description: |
      A single mod dependency. Either:
        - Short form: a mod-version constraint (string or null), fetched
          from the default Modrinth instance.
        - Long form: an object specifying at most one source (`hosted`,
          `url`, `path`, or `git`) and, optionally, a `version`
          constraint. Omitting all source fields is equivalent to the
          default Modrinth source.
    oneOf:
      - $ref: "#/$defs/modVersion"
      - $ref: "#/$defs/modSource"

  modSource:
    type: object
    description: |
      Long-form mod dependency. Specify at most one of `hosted`, `url`,
      `path`, or `git`. `url`, `path`, and `git` sources make the modpack
      non-publishable to Modrinth.
    additionalProperties: false
    properties:
      version:
        $ref: "#/$defs/modVersion"
      environment:
        description: |
          Which side of the modpack this mod ships with. Defaults to
          "both" when omitted.
        enum:
          - client
          - server
          - both
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct download URL for a mod .jar file.
      path:
        type: string
        description: Local filesystem path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source. Either an "owner/repo" shorthand string, a full git
          URL, or an object with `url` and optionally `ref` and `path`.
          The resolved tree must contain a mods.toml describing the mod.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  modMap:
    type: object
    description: |
      Map of Modrinth project slug to mod dependency (short or long form).
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/modDependency"
