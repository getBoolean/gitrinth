$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods.schema.yaml
title: mods.yaml
description: |
  Schema for a gitrinth modpack manifest. Modelled on the Dart pubspec.yaml
  specification (https://dart.dev/tools/pub/pubspec) and tailored for
  Modrinth-hosted Minecraft mods.

type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - description
  - environment

properties:

  id:
    type: string
    description: |
      Machine-readable identifier of the modpack, used as the Modrinth
      project slug and in generated artifact filenames. Lowercase ASCII
      letters, digits, and underscores; must start with a letter.
    pattern: ^[a-z][a-z0-9_]*$

  name:
    type: string
    description: |
      Human-readable display name of the modpack, shown on the Modrinth
      project page. Any non-empty string.
    minLength: 1

  version:
    type: string
    description: |
      Semantic version of the modpack itself, e.g. "1.0.0", "0.4.0-beta.1".
    pattern: ^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*$

  description:
    type: string
    description: Short, public-facing summary shown on Modrinth.
    minLength: 1

  homepage:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's home page.

  repository:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's source repository.

  issue_tracker:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's issue tracker.

  documentation:
    type: [string, "null"]
    format: uri
    description: URL of the modpack's user-facing documentation.

  publish_to:
    description: |
      Controls where `gitrinth publish` uploads the modpack. Set to "none"
      to disable publishing, or to a URL to target a custom Modrinth-
      compatible server. Omit for the default Modrinth instance.
    oneOf:
      - type: "null"
      - const: none
      - type: string
        format: uri

  gallery:
    type: [array, "null"]
    description: |
      List of screenshot paths relative to mods.yaml. Used to populate the
      Modrinth gallery when publishing.
    items:
      type: string
      minLength: 1

  categories:
    type: [array, "null"]
    description: |
      List of Modrinth modpack categories. Values must match Modrinth's
      catalogue of modpack tags.
    items:
      type: string
      minLength: 1
    uniqueItems: true

  environment:
    type: object
    description: Target Minecraft environment for the modpack.
    additionalProperties: false
    required:
      - loader
      - mc-version
    properties:
      loader:
        type: string
        description: |
          The mod loader the modpack targets. Values
          are plain YAML strings and do not need to be quoted.
        enum:
          - forge
          - fabric
          - neoforge
      mc-version:
        type: string
        description: |
          Exact Minecraft version, e.g. "1.21.1". Ranges and wildcards are
          not permitted.
        pattern: ^\d+\.\d+(?:\.\d+)?$
      gitrinth:
        type: [string, "null"]
        description: |
          Version constraint on the gitrinth CLI, using Dart pub-style
          ranges (e.g. "^1.0.0" or ">=1.0.0 <2.0.0"). May be blank.
        minLength: 1

  mods:
    description: |
      Mods included in both the client and server distributions. Keys are
      Modrinth project slugs; values are mod dependencies (short or long
      form). May be blank — useful for a modpack that is still being
      assembled.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  mod_overrides:
    description: |
      Overrides for individual mods. Uses the exact same value syntax as
      `mods` and takes precedence over any matching entry in `mods`,
      `client_mods`, or `server_mods`. Analogous to Dart pub's
      `dependency_overrides`. May be blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  client_mods:
    description: |
      Mods only included when building the client distribution. May be
      blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  server_mods:
    description: |
      Mods only included when building the server distribution. May be
      blank.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

$defs:

  modVersion:
    description: |
      A mod-version constraint. Exactly one of:
        - an exact version (e.g. "19.27.0.340", "6.0.10+mc1.21.1")
        - blank / null, meaning the latest compatible version
        - a caret constraint (e.g. "^6.0.10+mc1.21.1") for the latest
          version compatible with the given one
    oneOf:
      - type: "null"
      - type: string
        pattern: ^(?:\^)?\d+\.\d+(?:\.\d+)?(?:\.\d+)?(?:[-+][0-9A-Za-z.+\-]+)?$

  modDependency:
    description: |
      A single mod dependency. Modelled on Dart pub's dependencies
      (https://dart.dev/tools/pub/dependencies). Either:
        - Short form: a mod-version constraint (string or null), fetched
          from the default Modrinth instance.
        - Long form: an object specifying at most one source (`hosted`,
          `url`, `path`, or `git`) and, optionally, a `version`
          constraint. Omitting all source fields is equivalent to the
          default Modrinth source.
    oneOf:
      - $ref: "#/$defs/modVersion"
      - $ref: "#/$defs/modSource"

  modSource:
    type: object
    description: |
      Long-form mod dependency. Specify at most one of `hosted`, `url`,
      `path`, or `git`. `url`, `path`, and `git` sources make the modpack
      non-publishable to Modrinth.
    additionalProperties: false
    properties:
      version:
        $ref: "#/$defs/modVersion"
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct download URL for a mod .jar file.
      path:
        type: string
        description: Local filesystem path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source. Either an "owner/repo" shorthand string, a full git
          URL, or an object with `url` and optionally `ref` and `path`.
          The resolved tree must contain a mods.toml describing the mod.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  modMap:
    type: object
    description: |
      Map of Modrinth project slug to mod dependency (short or long form).
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/modDependency"
