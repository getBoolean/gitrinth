$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods.schema.yaml
title: mods.yaml
description: Gitrinth modpack manifest for Modrinth-hosted Minecraft mods.

type: object
additionalProperties: false
required:
  - slug
  - name
  - version
  - description
  - loader
  - mc-version

properties:

  slug:
    type: string
    description: |
      Modrinth project slug — the URL segment at
      modrinth.com/modpack/<slug>. Also used in artifact filenames.
    pattern: ^[a-z][a-z0-9_]*$

  name:
    type: string
    description: Display name shown on Modrinth. Maps to Modrinth's `title`.
    minLength: 1

  version:
    type: string
    description: Semantic version, e.g. "1.0.0", "0.4.0-beta.1".
    pattern: ^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*$

  description:
    type: string
    description: Summary shown on Modrinth.
    minLength: 1

  project:
    type: [object, "null"]
    additionalProperties: false
    description: |
      Modrinth project metadata. Fields map 1:1 to Modrinth's
      createProject API. All sub-fields optional.
    properties:

      body:
        type: [string, "null"]
        description: |
          Long-form description shown on Modrinth. Inline markdown, or
          a path (relative to mods.yaml) to a markdown file.

      source_url:
        type: [string, "null"]
        format: uri
        description: Source repository URL.

      issues_url:
        type: [string, "null"]
        format: uri
        description: Issue tracker URL.

      wiki_url:
        type: [string, "null"]
        format: uri
        description: Documentation URL.

      discord_url:
        type: [string, "null"]
        format: uri
        description: Discord invite URL.

      license_id:
        type: [string, "null"]
        description: SPDX license identifier (e.g. "MIT", "Apache-2.0").

      license_url:
        type: [string, "null"]
        format: uri
        description: License text URL.

      donation_urls:
        type: [array, "null"]
        description: Donation platform links.
        items:
          type: object
          additionalProperties: false
          required:
            - platform
            - url
          properties:
            platform:
              type: string
              description: Modrinth donation-platform id from `GET /tag/donation_platform`.
              enum:
                - patreon
                - bmac
                - paypal
                - github
                - ko-fi
                - other
            url:
              type: string
              format: uri
              description: Donation URL.

      categories:
        type: [array, "null"]
        description: Primary Modrinth modpack categories.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      additional_categories:
        type: [array, "null"]
        description: Secondary categories — searchable but not shown as primary tags.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      client_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: Client-side compatibility.

      server_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: Server-side compatibility.

      gallery:
        type: [array, "null"]
        description: Screenshot paths relative to mods.yaml. Populates the Modrinth gallery.
        items:
          type: string
          minLength: 1

  publish_to:
    description: |
      URL of the Modrinth-compatible server `gitrinth publish` uploads
      to. Omit (or set `null`) to publish to modrinth.com. Set to
      `none` to disable publishing.
    type: [string, "null"]
    format: uri

  loader:
    type: string
    description: |
      Mod loader the modpack targets. Drives version resolution,
      Modrinth compatibility, and server-binary selection.

      Under plugin loaders (`bukkit`, `folia`, `paper`, `spigot`),
      `mods` ship client-only regardless of `environment`; `plugins`
      ship server-only. `shaders` are always client-only; `sponge`
      behaves like `forge`/`fabric`/`neoforge`.
    enum:
      - forge
      - fabric
      - neoforge
      - bukkit
      - folia
      - paper
      - spigot
      - sponge

  mc-version:
    type: string
    description: |
      Exact Minecraft version, e.g. "1.21.1". No ranges or wildcards.
      Drives version resolution, Modrinth compatibility, and
      server-binary selection alongside `loader`.
    pattern: ^\d+\.\d+(?:\.\d+)?$

  tooling:
    type: [object, "null"]
    description: Tooling version constraints.
    additionalProperties: false
    properties:
      gitrinth:
        type: [string, "null"]
        description: Semver range for the gitrinth CLI (e.g. "^1.0.0", ">=1.0.0 <2.0.0").
        minLength: 1

  mods:
    description: |
      Mods, keyed by Modrinth project slug. Values are dependencies
      (short or long form).
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  resource_packs:
    description: Resource packs. Same syntax as `mods`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  data_packs:
    description: Data packs. Same syntax as `mods`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  shaders:
    description: |
      Shader packs. Same syntax as `mods`; `environment` is not
      permitted — shaders are always client-only.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/forcedEnvModMap"

  plugins:
    description: |
      Server plugins. Same syntax as `mods`; `environment` is not
      permitted — plugins are always server-only.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/forcedEnvModMap"

  overrides:
    description: |
      Overrides entries in `mods`, `resource_packs`, `data_packs`,
      `shaders`, or `plugins`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  servers:
    description: |
      Default servers in the client's multiplayer menu, keyed by Modrinth
      server slug. A blank value looks the slug up on the default Modrinth
      instance. Long-form entries may override the display `name`, pin an
      explicit `address`, or redirect the lookup to a Modrinth-compatible
      server via `hosted`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/serverMap"

$defs:

  modVersion:
    description: |
      Mod-version constraint. Either `any` (latest compatible), or a
      version string with optional `^` caret prefix (e.g. "19.27.0.340",
      "^6.0.10+mc1.21.1").
    oneOf:
      - type: "null"
      - type: string
        minLength: 1

  modDependency:
    description: |
      Mod dependency. Short form: a version constraint (from default
      Modrinth). Long form: object with at most one source (`hosted`,
      `url`, `path`, `git`) and optional `version`.
    oneOf:
      - $ref: "#/$defs/modVersion"
      - $ref: "#/$defs/modSource"

  modSource:
    type: object
    description: |
      Long-form mod dependency. At most one of `hosted`, `url`, `path`,
      `git`. `url`, `path`, and `git` make the modpack non-publishable
      to Modrinth.
    additionalProperties: false
    properties:
      version:
        $ref: "#/$defs/modVersion"
      environment:
        description: Which side this mod ships with.
        default: both
        enum:
          - client
          - server
          - both
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct .jar download URL.
      path:
        type: string
        description: Local path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source: `owner/repo` shorthand, a git URL, or an object
          with `url` and optional `ref`/`path`. Resolved tree must
          contain a mods.toml.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  modMap:
    type: object
    description: Map of Modrinth project slug to mod dependency.
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/modDependency"

  forcedEnvSource:
    type: object
    description: |
      Long-form dependency for `shaders` and `plugins`. Same as
      `modSource` but `environment` is not permitted.
    additionalProperties: false
    errorMessage:
      additionalProperties: "`environment` is not allowed here — shaders are always client-only and plugins are always server-only. Remove this field; the section itself decides the side."
    properties:
      version:
        $ref: "#/$defs/modVersion"
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct .jar download URL.
      path:
        type: string
        description: Local path relative to mods.yaml.
        minLength: 1
      git:
        description: |
          Git source: `owner/repo` shorthand, a git URL, or an object
          with `url` and optional `ref`/`path`.
        oneOf:
          - type: string
            minLength: 1
          - type: object
            additionalProperties: false
            required: [ url ]
            properties:
              url:
                type: string
                minLength: 1
              ref:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ hosted, git ]
      - not:
          required: [ url, path ]
      - not:
          required: [ url, git ]
      - not:
          required: [ path, git ]

  forcedEnvModMap:
    type: object
    description: |
      Map for `shaders` and `plugins` — same as `modMap` but
      `environment` is disallowed on entries.
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      # Dispatch on value shape so the validator reports a specific
      # error (e.g. "`environment` is not allowed") rather than the
      # generic "matches 0 schemas" that oneOf produces when every
      # branch fails.
      if:
        type: object
      then:
        $ref: "#/$defs/forcedEnvSource"
      else:
        $ref: "#/$defs/modVersion"

  serverMap:
    type: object
    description: Map of Modrinth server slug to server entry.
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/serverEntry"

  serverEntry:
    description: |
      Server entry. Blank — the slug is looked up on the default Modrinth
      instance and its `name` and `address` are used as-is. Long form —
      a map overriding the display `name`, pinning an explicit `address`,
      or redirecting the lookup to a Modrinth-compatible server via
      `hosted`. `address` and `hosted` are mutually exclusive; `name` is
      an independent override.
    oneOf:
      - type: "null"
      - type: object
        additionalProperties: false
        properties:
          name:
            type: string
            minLength: 1
            description: |
              Display name override shown in the multiplayer menu. Without
              this, the name from Modrinth is used.
          address:
            type: string
            minLength: 1
            description: |
              Server address, optional port (e.g. "play.example.com:25565").
              When omitted, fetched from the Modrinth API using the key.
          hosted:
            type: string
            format: uri
            description: |
              Base URL of a Modrinth-compatible server to look up the slug
              on. The `hosted:` analogue on `mods`.
        allOf:
          - not:
              required: [ address, hosted ]
