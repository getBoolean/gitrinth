$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods-overrides.schema.yaml
title: mods_overrides.yaml
description: |
  Companion to mods.yaml holding overrides for `mods`,
  `resource_packs`, `data_packs`, `shaders`, or `plugins` entries.
  Entries here win over mods.yaml's `overrides` section on key
  conflicts; non-conflicting keys from both sources are unioned.

type: object
additionalProperties: false
properties:
  overrides:
    description: |
      Map of Modrinth project slug to mod dependency (short or long
      form). Pins a version, flips `environment`, or redirects an
      entry to an alternate source (`hosted`, `url`, `path`).
      Same shape as `overrides` in mods.yaml.
    oneOf:
      - type: "null"
      - $ref: https://gitrinth.dev/schemas/mods.schema.yaml#/$defs/modMap
