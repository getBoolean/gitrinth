$schema: https://json-schema.org/draft/2020-12/schema
$id: https://gitrinth.dev/schemas/mods.schema.yaml
title: mods.yaml
description: Gitrinth modpack manifest for Modrinth-hosted Minecraft mods.

type: object
additionalProperties: false
required:
  - slug
  - name
  - version
  - description
  - loader
  - mc-version

properties:

  slug:
    type: string
    description: |
      Modrinth project slug — the URL segment at
      modrinth.com/modpack/<slug>. Also used in artifact filenames.
    pattern: ^[a-z][a-z0-9_]*$

  name:
    type: string
    description: Display name shown on Modrinth. Maps to Modrinth's `title`.
    minLength: 1

  version:
    type: string
    description: Semantic version, e.g. "1.0.0", "0.4.0-beta.1".
    pattern: ^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*$

  description:
    type: string
    description: Summary shown on Modrinth.
    minLength: 1

  project:
    type: [object, "null"]
    additionalProperties: false
    description: |
      Modrinth project metadata. Fields map 1:1 to Modrinth's
      createProject API. All sub-fields optional.
    properties:

      body:
        type: [string, "null"]
        description: |
          Long-form description shown on Modrinth. Inline markdown, or
          a path (relative to mods.yaml) to a markdown file.

      source_url:
        type: [string, "null"]
        format: uri
        description: Source repository URL.

      issues_url:
        type: [string, "null"]
        format: uri
        description: Issue tracker URL.

      wiki_url:
        type: [string, "null"]
        format: uri
        description: Documentation URL.

      discord_url:
        type: [string, "null"]
        format: uri
        description: Discord invite URL.

      license_id:
        type: [string, "null"]
        description: SPDX license identifier (e.g. "MIT", "Apache-2.0").

      license_url:
        type: [string, "null"]
        format: uri
        description: License text URL.

      categories:
        type: [array, "null"]
        description: Primary Modrinth modpack categories.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      additional_categories:
        type: [array, "null"]
        description: Secondary categories — searchable but not shown as primary tags.
        items:
          type: string
          minLength: 1
        uniqueItems: true

      client_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: Client-side compatibility.

      server_side:
        type: [string, "null"]
        enum:
          - required
          - optional
          - unsupported
          - unknown
          - null
        default: required
        description: Server-side compatibility.

  publish_to:
    description: |
      URL of the Modrinth-compatible server `gitrinth publish` uploads
      to. Omit (or set `null`) to publish to modrinth.com. Set to
      `none` to disable publishing.
    type: [string, "null"]
    format: uri

  loader:
    type: object
    description: |
      Per-section loaders. `mods` is required; `shaders` and `plugins`
      are optional and only needed when the corresponding section has
      entries. `resource_packs` and `data_packs` have a single valid
      Modrinth loader each (`minecraft`, `datapack`) and are never
      declared here.

      Under plugin loaders (`bukkit`, `folia`, `paper`, `spigot`),
      `mods` ship client-only regardless of per-side fields; `plugins`
      ship server-only. `shaders` are always client-only; `sponge`
      behaves like `forge`/`fabric`/`neoforge`.
    required:
      - mods
    additionalProperties: false
    properties:
      mods:
        description: |
          Mod loader the modpack targets, optionally with a version tag
          in docker-image style: `<loader>` or `<loader>:<tag>`.

          - Loader: one of `forge`, `fabric`, `neoforge`.
          - Tag (optional): `stable` (default — latest stable loader),
            `latest` (newest of any stability), or a concrete version
            string (e.g. `0.17.3`). Resolved against Modrinth at `get`
            time and frozen into `mods.lock`.

          Examples: `neoforge`, `fabric:stable`, `fabric:latest`,
          `fabric:0.17.3`.

          Drives version resolution, Modrinth compatibility, and
          server-binary selection.
        type: string
        pattern: ^(forge|fabric|neoforge)(:[^:\s][^:]*)?$
      shaders:
        description: |
          Shader loader. Required when the `shaders` section has
          entries; otherwise omit.
        enum:
          - iris
          - optifine
          - canvas
          - vanilla
      plugins:
        description: |
          Plugin loader. Deferred in the MVP — accepted by the schema
          but rejected by the parser until plugin support lands.
        enum:
          - bukkit
          - folia
          - paper
          - spigot

  mc-version:
    type: string
    description: |
      Exact Minecraft version, e.g. "1.21.1". No ranges or wildcards.
      Snapshots (`24w10a`, `1.21-pre1`, `1.21-rc1`) and historical tags
      (`b1.7.3`) are accepted — the server-binary auto-download path
      may not cover them. Drives version resolution, Modrinth
      compatibility, and server-binary selection alongside `loader`.
    pattern: ^[A-Za-z0-9][A-Za-z0-9._+-]*$

  tooling:
    type: [object, "null"]
    description: Tooling version constraints.
    additionalProperties: false
    properties:
      gitrinth:
        type: [string, "null"]
        description: Semver range for the gitrinth CLI (e.g. "^1.0.0", ">=1.0.0 <2.0.0").
        minLength: 1

  mods:
    description: |
      Mods, keyed by Modrinth project slug. Values are dependencies
      (short or long form).
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  resource_packs:
    description: Resource packs. Same syntax as `mods`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  data_packs:
    description: Data packs. Same syntax as `mods`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  shaders:
    description: |
      Shader packs. Same syntax as `mods`. Shader entries always have
      `server: unsupported` (validated by the parser); the only meaningful
      `client` values are `required` and `optional`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  plugins:
    description: |
      Server plugins. Same syntax as `mods`. Plugin entries are server
      side; the parser is expected to default `client` to `unsupported`.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  project_overrides:
    description: |
      Overrides for individual Modrinth project entries declared in
      `mods`, `resource_packs`, `data_packs`, `shaders`, or `plugins`,
      and for purely-transitive Modrinth project dependencies. Keys are
      Modrinth project slugs; values use the same mod-dependency syntax
      as `mods`. Pinning a version, flipping per-side install state, or
      redirecting to `url:`/`path:` are all supported. An entry here
      forces its version to be used regardless of other mods'
      constraints or `incompatible:` declarations.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/modMap"

  files:
    description: |
      Loose files copied into the build tree (e.g. config files,
      scripts) and bundled into the `.mrpack` archive's overrides
      tree. Keys are destination paths relative to the build env
      root (e.g. `config/sodium-options.json`); values declare a
      local source path and per-side install state.

      Destination keys must be relative, normalized (no `..`, no
      `./`, no `//`, no leading `/` or `\`), non-empty paths.

      `preserve: true` makes the file first-install-only: the
      build step skips overwriting an existing destination so
      user edits survive subsequent rebuilds. `preserve` is not
      sticky — removing the entry from `files:` prunes the file on
      the next build.
    oneOf:
      - type: "null"
      - $ref: "#/$defs/fileMap"

$defs:

  modVersion:
    description: |
      Short-form mod dependency. One of: null (latest of any
      `version_type`), a release-channel token (`release`, `beta`,
      `alpha`) that pins the stability floor, or a version constraint.

      Constraint forms: exact pin ("19.27.0.340"), caret
      ("^6.0.10+mc1.21.1"), or relational range with `>=`, `>`, `<=`,
      `<` — single bound (">=1.5.0") or two-bound intersection
      (">=1.0.0 <3.0.0"). Quote ranges so YAML doesn't read `<` as a
      tag.

      When no channel is declared (null or a version constraint), every
      `version_type` is admitted.
    anyOf:
      - type: "null"
      - type: string
        enum:
          - release
          - beta
          - alpha
      - type: string
        minLength: 1

  acceptsMc:
    description: |
      Additional Minecraft versions to include in the Modrinth
      `game_versions` query for this entry. Additive to the pack's
      `mc-version`, query-time only — never overrides it. Use when a
      mod works on the pack's `mc-version` but the author tagged only
      adjacent versions on Modrinth. Scalar or list; bare YAML scalars
      like `1.21` are accepted (`number`) as well as quoted strings.
      Snapshot-style tags (`24w10a`, `1.21-pre1`) are permitted.
    oneOf:
      - type: string
        pattern: ^[A-Za-z0-9][A-Za-z0-9._+-]*$
      - type: number
      - type: array
        items:
          oneOf:
            - type: string
              pattern: ^[A-Za-z0-9][A-Za-z0-9._+-]*$
            - type: number
        uniqueItems: true
        minItems: 1

  modDependency:
    description: |
      Mod dependency. Short form: a version constraint (from default
      Modrinth). Long form: object with at most one source (`hosted`,
      `url`, `path`) and optional `version`.
    oneOf:
      - $ref: "#/$defs/modVersion"
      - $ref: "#/$defs/modSource"

  modSource:
    type: object
    description: |
      Long-form mod dependency. At most one of `hosted`, `url`, `path`.
      `url` and `path` make the modpack non-publishable to Modrinth.
    additionalProperties: false
    properties:
      version:
        $ref: "#/$defs/modVersion"
      channel:
        description: |
          Release-channel floor for this entry. Stability floors:
          `release` admits only stable releases, `beta` admits
          `release` + `beta`, `alpha` admits all. Omit to default to
          `alpha` (any `version_type`).
        enum:
          - release
          - beta
          - alpha
      client:
        description: |
          Install state on the client side. `required` ships the entry
          as a mandatory dependency; `optional` ships it but lets the
          launcher present a user-facing toggle (mrpack `env: optional`);
          `unsupported` excludes it from the client build entirely.
        enum:
          - required
          - optional
          - unsupported
      server:
        description: |
          Install state on the server side. Same vocabulary as `client`.
        enum:
          - required
          - optional
          - unsupported
      accepts-mc:
        $ref: "#/$defs/acceptsMc"
      hosted:
        type: string
        format: uri
        description: Base URL of a Modrinth-compatible server.
      url:
        type: string
        format: uri
        description: Direct .jar download URL.
      path:
        type: string
        description: Local path relative to mods.yaml.
        minLength: 1
    allOf:
      - not:
          required: [ hosted, url ]
      - not:
          required: [ hosted, path ]
      - not:
          required: [ url, path ]

  modMap:
    type: object
    description: Map of Modrinth project slug to mod dependency.
    propertyNames:
      pattern: ^[a-z0-9][a-z0-9_-]*$
    additionalProperties:
      $ref: "#/$defs/modDependency"

  fileEntry:
    type: object
    description: |
      Loose file declaration. `path` (required) is a local source
      path relative to mods.yaml. `client` / `server` mirror the
      `SideEnv` vocabulary (`required` / `unsupported`); `optional`
      is rejected for `files:` entries pending a real toggle
      mechanism. `preserve: true` skips overwrite on rebuild.
    additionalProperties: false
    required:
      - path
    properties:
      path:
        type: string
        minLength: 1
        description: Source path relative to mods.yaml.
      client:
        description: Install state on the client side.
        enum:
          - required
          - unsupported
      server:
        description: Install state on the server side.
        enum:
          - required
          - unsupported
      preserve:
        type: boolean
        default: false
        description: |
          When true, build does not overwrite an existing file at
          the destination path. First-install-only behavior so
          user edits survive rebuilds.

  fileMap:
    type: object
    description: |
      Map of destination path (relative to build env root) to file
      declaration. Destination keys must be relative and normalized
      (no `..`, no leading `/` or `\`).
    propertyNames:
      pattern: ^[^/\\][^\\]*$
    additionalProperties:
      $ref: "#/$defs/fileEntry"

