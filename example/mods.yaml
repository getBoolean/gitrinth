# yaml-language-server: $schema=../assets/schema/mods.schema.yaml
slug: example_modpack
name: Example Modpack
version: 0.1.0
description: Required. A short description of the modpack. This will be
  displayed on modrinth and should give users a good idea of what the modpack is
  about. It should be concise and informative, ideally no more than a few
  sentences.

project:
  # Every sub-field maps 1:1 to Modrinth's createProject API.
  body: ./README.md
  source_url:
  issues_url:
  wiki_url:
  discord_url:
  license_id: MIT
  license_url:
  categories:
    - multiplayer
    - technology
  additional_categories:
    # Searchable but non-primary.
    - magic
  client_side: required # Enum: required, optional, unsupported, unknown. Default: required.
  server_side: required # Enum: required, optional, unsupported, unknown. Default: required.

publish_to: none # Default: modrinth.com. Set to a URL to publish to a different Modrinth-compatible server.

loader: neoforge # Enum: forge, fabric, neoforge, sponge, bukkit, folia, paper, spigot. Under plugin loaders (bukkit/folia/paper/spigot), `mods` entries are forced client-side; resource_packs/data_packs/plugins partition normally; shaders are always client-only.
mc-version: 1.21.1 # Exact version only — no ranges.

tooling:
  gitrinth: ">=1.0.0 < 2.0.0" # Semver range constraint on the gitrinth CLI version.

mods:
  # Keys are Modrinth project slugs (modrinth.com/mod/<slug>).
  # Caution: `url` and `path` sources make the modpack unpublishable on modrinth.
  create: ^6.0.10+mc1.21.1
  create-aeronautics: ^1.1.0+mc1.21.1
  sable: ^1.1.1+mc1.21.1
  jei: ^19.27.0.340
  # Allow release and beta versions (not alpha).
  distanthorizons: beta
  iris:
    version: ^1.8.12+1.21.1-neoforge
    environment: client # Restrict to client or server only. Default: both. Only needed if Modrinth metadata is mislabeled or you want a slimmer distribution.
  netherportalfix:
    version: ^21.1.1+neoforge-1.21.1
    channel: release
    environment: server

resource_packs:
  faithful-32x: ^1.21.1-december-2025

data_packs:
  terralith: ^2.5.8

shaders:
  complementary-shaders: ^r5.7.1

plugins:

overrides:
  jei:
    version: 19.27.0.340
    # hosted: https://some-modrinth-server.com # Optional. Specify a custom modrinth server to download the mod from.
    # url: https://example.com/path/to/jei.jar
    # path: ./path/to/jei.jar # Optional. Specify a local path to a mod instead of downloading it from modrinth.
