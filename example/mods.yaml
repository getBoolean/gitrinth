# yaml-language-server: $schema=../assets/schema/mods.schema.yaml
slug: example_modpack
name: Example Modpack
version: 0.1.0
description: Required. A short description of the modpack. This will be
  displayed on modrinth and should give users a good idea of what the modpack is
  about. It should be concise and informative, ideally no more than a few
  sentences.

project:
  # Every sub-field maps 1:1 to Modrinth's createProject API.
  body: ./README.md
  source_url:
  issues_url:
  wiki_url:
  discord_url:
  license_id: MIT
  license_url:
  categories:
    - multiplayer
    - technology
  additional_categories:
    # Searchable but non-primary.
    - magic
  client_side: required # Enum: required, optional, unsupported, unknown. Default: required.
  server_side: required # Enum: required, optional, unsupported, unknown. Default: required.

publish_to: none # Default: modrinth.com. Set to a URL to publish to a different Modrinth-compatible server.

loader:
  # Per-section loaders. `mods` is required; `shaders` is required when
  # the shaders section is non-empty; `plugins` is deferred until plugin
  # support lands. resource_packs and data_packs each have a single
  # valid Modrinth loader (minecraft, datapack) and are never declared
  # here.
  mods: neoforge:stable # Enum: forge, fabric, neoforge.
  shaders: iris # Enum: iris, optifine, canvas, vanilla.
  # plugins: sponge # Enum: sponge, bukkit, folia, paper, spigot. Deferred until plugin support lands.

mc-version: 1.21.1 # Exact version only — no ranges.

tooling:
  gitrinth: ">=1.0.0 < 2.0.0" # Semver range constraint on the gitrinth CLI version.

mods:
  # Keys are Modrinth project slugs (modrinth.com/mod/<slug>).
  # Caution: `url` and `path` sources make the modpack unpublishable on modrinth.
  create: ^6.0.10 # Downloads version 6.0.10+mc1.21.1 or later stable 6.x releases.
  create-aeronautics: ^1.1.3 # 1.1.0+mc1.21.1
  sable: ^1.1.3 # 1.1.1+mc1.21.1
  jei: ^19.27.0+340 # 19.27.0.340
  sodium: beta
  ferrite-core: beta
  # Allow release and beta versions (not alpha).
  # `^3.0.1-b` would match any `3.0.1-b-<mc>` beta (e.g. 3.0.1-b-1.21.1)
  # plus later stable 3.x releases.
  distanthorizons:
    version: beta
    # Ships on both sides but launcher offers a toggle on each
    # (mrpack `env: optional`).
    client: optional
    server: required
  iris:
    version: ^1.8.12+1.21 # 1.8.12+1.21.1-neoforge
    # Restrict to one side. Default per section: mods are required on
    # both. Set a side to `unsupported` to drop it there.
    client: required
    server: unsupported
    accepts-mc:
      - 1.21.1 # Use a mod that doesn't declare mc-version support
  netherportalfix:
    version: ^21.1.1
    channel: beta # Restrict to a specific release channel newer than the semver version.
    client: optional
    server: required
  appleskin:
    version: ^3.0.9
    accepts-mc: 1.21.1 # Scalar shorthand for [1.21.1]
  globalpacks: ^21.0.6
  # Semver range constraint — quote because bare < and > would
  # confuse the YAML parser. Pairs of bounds intersect; either side
  # may be omitted (`">=1.5.0"`, `"<2.0.0"`).
  # trinkets: ">=3.0.0 <4.0.0"

resource_packs:
  faithful-32x:
    version: ^1.21.1-december-2025
    client: optional # Resource packs default to `client: optional, server: unsupported`.

data_packs:
  terralith: ^2.5.8
  terralith-restoned: ^1.3.1

shaders:
  complementary-reimagined: r5.7.1 # Pin an exact version (newer version wont be downloaded)

plugins:

project_overrides:
  # jei:
  #   version: 19.27.0.340
  #   # hosted: https://some-modrinth-server.com # Optional. Specify a custom modrinth server to download the mod from.
  #   # url: https://example.com/path/to/jei.jar
  #   # path: ./path/to/jei.jar # Optional. Specify a local path to a mod instead of downloading it from modrinth.

files:
  # Loose files copied into the build tree by `build` and bundled
  # into the .mrpack overrides root by `pack`. Keys are destination
  # paths relative to build/<env>/; values declare a local source
  # path. `preserve: true` means build won't overwrite the dest on
  # rebuild — user edits to the deployed file survive (preserve is
  # NOT sticky against removal from this section).
  #
  # config/sodium-options.json:
  #   path: ./presets/sodium-options.json
  #   preserve: true
  # kubejs/server_scripts/loot.js:
  #   path: ./scripts/loot.js
  #   client: unsupported # Server-only script.
  #   server: required
